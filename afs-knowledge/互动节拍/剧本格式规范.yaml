# 国内通用剧本格式规范（AI导演 — 共享知识库）
# 来源：M2 课时6

符号规范:
  △: 所有非对话的视觉描述
  "()": 人物动作/神态标注（在台词前）
  场号: '"场{场次}-{段落}" 格式，如 场1-1、场2-3'
  时间空间: '"夜/内" "日/外" 等'
  OS: 内心独白
  VO: 画外音（电话、广播等）

剧本模板: |
  场{场号} {时间}/{空间} {场景名}
  人物：{出场人物}

  △ {景别}：{画面描述}

  {角色名}：{台词}

  △ {景别}：{下一画面}

  {角色名}：（{神态}）{台词}

去AI味规则:
  禁止使用:
    - "△ 镜SC1-1-01 [8s]" # 系统化编号+精确秒数
    - "## 场景一：" # Markdown标题格式
    - "**角色名**（表情）台词" # Markdown加粗
    - 系统化镜头编号

  正确使用:
    - "△ 稳定器正推，全景" # 自然书写
    - "场景一" # 纯文本标题
    - "角色名：（表情）台词" # 剧作标准格式

硬规则:
  - △行只写镜头能拍到的东西，禁止心理描写和内心独白
  - 每场戏不少于3个△画面行
  - 用 [紧张] [释然] [期待] [失落] [愤怒] [恐惧] 标注情绪Beat
