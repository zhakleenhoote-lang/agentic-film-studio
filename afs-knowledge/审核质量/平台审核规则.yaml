## 通用规则（四平台共有，任一违规即不通过）

国家及社会安全:
  label: "国家及社会安全"
  items:
    - "反对宪法基本原则"
    - "危害国家安全、泄露国家秘密"
    - "损害国家形象、荣誉和利益"
    - "煽动民族仇恨、民族歧视"
    - "破坏国家统一和领土完整"
    - "违背国家宗教政策、宣扬邪教"
    - "煽动非法集会、游行、示威"
    - "泄露国家机密（国防/科技/军工）"
  asset_card_mapping:
    角色卡: "角色设定不涉及国家安全敏感身份"
    道具卡: "道具不含国旗/国徽/军旗/人民币等国家象征物的恶搞使用"
    场景卡: "场景不含错误中国地图、敏感军事场所坐标"

暴力与恐怖主义:
  label: "暴力与恐怖主义"
  items:
    - "宣扬暴力、恐怖、极端主义"
    - "展示暴恐画面/标志/旗帜"
    - "美化侵略战争和殖民史"
    - "歪曲、丑化、亵渎英雄烈士"
  asset_card_mapping:
    角色卡: "角色不涉及恐怖分子/极端组织成员设定"
    道具卡: "道具禁止出现枪支弹药/爆炸物/管制刀具/弓弩"
    场景卡: "场景禁止出现暴力恐怖场景/法西斯标志"

色情低俗:
  label: "色情低俗"
  items:
    - "色情、淫秽内容"
    - "低俗擦边、性暗示、性挑逗"
    - "软色情内容"
  asset_card_mapping:
    角色卡: "角色服饰不得过度裸露/性暗示"
    道具卡: "道具不得出现成人用品"
    场景卡: "场景不得出现色情场所/暗示性场景"

未成年人保护:
  label: "未成年人保护（四平台最高优先级）"
  items:
    - "未成年人色情低俗内容（零容忍）"
    - "利用未成年人牟利"
    - "危害/影响未成年人身心健康"
    - "16岁以下出镜须监护人同意"
    - "校园暴力内容"
    - "诱导未成年人应援消费"
  asset_card_mapping:
    角色卡: "角色年龄≥18岁或合规处理；未成年人角色不得涉及敏感场景"
    道具卡: "不得出现诱导未成年人消费的道具（如彩票/博彩道具）"
    场景卡: "学校/未成年人场所场景不得涉及暴力/色情/不良引导"

虚假与不实信息:
  label: "虚假与不实信息"
  items:
    - "传播谣言、虚假信息"
    - "伪科学、封建迷信"
    - "欺诈、误导性信息"
  asset_card_mapping:
    角色卡: "角色设定不涉及伪科学/迷信职业（如算命先生/风水大师）"
    道具卡: "道具不含占卜/法器/迷信物品"
    场景卡: "场景不涉及道场作法/跳大神等迷信活动场所"

知识产权与肖像权:
  label: "知识产权与肖像权"
  items:
    - "侵犯著作权、商标权、专利权"
    - "未经授权使用他人商号/LOGO/商标"
    - "侵犯肖像权、名誉权、隐私权"
    - "盗用他人创意/文案（相似度>60%）"
  asset_card_mapping:
    角色卡: "角色形象不侵犯真人肖像权/明星形象权"
    道具卡: "道具不含未经授权的第三方LOGO/商标/品牌标识"
    场景卡: "场景不含其他平台水印/商业广告标识；公共标识不涉及真实品牌"

AI内容标识:
  label: "AI生成内容标识（2026年四平台强制要求）"
  items:
    - "AI生成图片/视频须显著标识"
    - "深度换脸/AI人物生成须标注"
    - "虚假摆拍AI内容按违规处理"
    - "平台有权自行添加显式/隐式标识"
  asset_card_mapping:
    角色卡: "AI生成角色CGI图须标注"
    道具卡: "AI生成道具图须标注"
    场景卡: "AI生成场景图须标注"

广告法合规:
  label: "广告法合规（四平台共遵）"
  items:
    - "禁止绝对化用语：第一/最佳/顶级/极致/完美/无敌/100%/唯一"
    - "禁止医疗暗示用语：治疗/治愈/根治/疗效"
    - "禁止承诺保证：无效退款/保证见效/无风险/高收益"
    - "非医药广告不得涉及医疗用语"
    - "广告须具有可识别性（标注'广告'）"
    - "禁止虚假宣传、夸大宣传"
  asset_card_mapping:
    角色卡: "角色台词/介绍不含有广告违禁词"
    道具卡: "商品化道具不涉及虚假功效宣传/三无产品"
    场景卡: "场景中的商业广告内容符合广告法"

仇恨与歧视:
  label: "仇恨与歧视言论"
  items:
    - "地域歧视、民族歧视、种族歧视"
    - "针对残障人士等特定群体的歧视"
    - "性别歧视、引战制造对立"

## 平台专项规则

抖音:
  name: "抖音"
  url_source: "aweme.snssdk.com 官方公约"
  special:
    - "禁止借助社会负面事件/敏感事件进行商业营销"
    - "禁止展示手术/纹身/纹眉过程或刻意展示伤口"
    - "禁止危险驾驶/危险行为展示"
    - "禁止恶意审丑博眼球"
    - "禁止过度炒作明星绯闻/娱乐八卦"
    - "画质模糊/搬运内容/带其他平台水印logo → 不推荐"
    - "禁止炫耀超高消费、餐饮浪费"
    - "禁止批量同质化低质量内容"
    - "违法销售烟草等禁止（含画面展示烟酒品牌）"

小红书:
  name: "小红书（最严审核平台）"
  url_source: "官方社区公约 2026年3月版"
  special:
    - "真实体验验证：需保留购买凭证/到店记录"
    - "商业合作强制披露：须加'广告'或'合作'标签"
    - "AI内容强制标注（违者按虚假内容处理）"
    - "禁止站外引流（扫码/私我/主页有等话术）"
    - "禁止无体验/虚构体验的产品推荐"
    - "禁止PS前后对比图营造虚假效果"
    - "禁止夸张不实标题/封面"
    - "品牌违规扣分机制（10分封禁28天）"
    - "烟草酒类广告严格限制"

B站:
  name: "B站"
  url_source: "member.bilibili.com 社区公约"
  special:
    - "严肃的地图使用规范（须完整、带审图号）"
    - "禁止缩写/错误表达中国地名"
    - "禁止转载冒充自制"
    - "禁止标签（TAG）违规"
    - "禁止低质搬运/撞车重复投稿"
    - "违禁物品含弓弩/水弹枪/仿真枪等"
    - "创作公约强调'认真创作'"

视频号:
  name: "视频号"
  url_source: "weixin.qq.com 运营规范"
  special:
    - "禁止诱导用户分享/关注（利诱/胁迫）"
    - "禁止刷量刷粉（含方法传播）"
    - "禁止荐股/推荐金融产品"
    - "禁止传播特殊识别码/口令类信息"
    - "AI音视频须显著标识"
    - "未成年人素材须取得监护人同意"

## 资产卡投放合规维度（融入原9/6/8维）

角色卡_投放合规:
  label: "投放合规（第10维）"
  dimensions:
    年龄合规:
      - "角色年龄≥18岁（16-18岁须特别标注监护人同意）"
      - "未成年人角色不得涉及色情/暴力/不良引导场景"
      - "未成年人角色不得有裸露/性暗示服饰"
      - "未成年人角色不得涉及吸烟/饮酒/赌博行为"
    服饰合规:
      - "不得过度裸露（泳装/内衣等须在合规场景）"
      - "不得穿着带有歧视性/极端主义标识的服饰"
      - "不得穿着仿冒军警制服（易混淆执法部门）"
      - "服饰不得印有未经授权品牌LOGO/商标"
      - "服饰不得含有政治敏感图案/文字"
    形象合规:
      - "不得涉及国家领导人/政治人物形象"
      - "不得涉及英雄烈士形象（含恶搞/歪曲）"
      - "不得涉及已知负面人物形象"
      - "不得涉及真人明星形象（侵犯肖像权）"
      - "AI生成角色须标注AI生成"
      - "不得使用带有歧视性的刻板形象（民族/种族/残障）"

道具卡_投放合规:
  label: "投放合规（第7维）"
  dimensions:
    道具雷区:
      - "枪支弹药（含仿真枪、水弹枪）"
      - "管制刀具/弓弩"
      - "爆炸物/易燃物"
      - "毒品/麻醉药物/精神药物（鸦片/吗啡/海洛因/笑气/摇头丸等）"
      - "烟草制品（含电子烟）"
      - "三无产品"
      - "野生动植物制品"
      - "人民币（禁止恶搞/涂鸦/伪造）"
      - "证件类（伪造身份证/护照等）"
      - "国家象征物（国旗/国徽/军旗 — 禁止恶搞/焚烧/践踏场景）"
    商品化标识:
      - "真实品牌LOGO露出须提供授权证明"
      - "虚构品牌不得与真实品牌混淆（攀附/高仿）"
      - "不得使用未授权明星/名人形象"
      - "不得使用'葛优躺'等知名形象（含漫改/AI二改商用）"
      - "IP二创内容须注明'二次创作'并尊重原作版权"

场景卡_投放合规:
  label: "投放合规（第9维）"
  dimensions:
    场所合规:
      - "夜店/酒吧/歌舞厅：不得展示未成年人进入、不得展示吸毒/性交易"
      - "医院：不得展示不规范医疗操作、手术过程"
      - "学校/幼儿园：不得涉及暴力/欺凌/色情场景"
      - "未成年人场所：网吧/游戏厅等不得涉及未成年人违规进入"
      - "宗教场所：不得过度展示宗教仪式/教义传播"
      - "军事场所：不得泄露坐标/军事设施/军事行动"
    公共标识:
      - "不得出现错误地图（中国地图必须完整）"
      - "不得出现错误地名（如'新疆维吾尔族自治区'应为'新疆维吾尔自治区'）"
      - "不得出现未授权的真实品牌广告"
      - "路牌/标识不得含政治敏感内容"
      - "公共标识不得含歧视性/侮辱性语言"
      - "广告牌内容须符合广告法"
