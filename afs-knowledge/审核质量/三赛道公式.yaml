# 三赛道剧本公式（AI导演 — 共享知识库）
# 来源：M2 课时6/9/10/11

TVC:
  名称: TVC商业广告 30秒
  段数: 6段
  结构:
    - 段: 1
      时间: "0-5秒"
      内容: 悬念建立
      镜头: 特写/大特写，产品局部+材质细节
      情绪: 好奇
    - 段: 2
      时间: "5-10秒"
      内容: 场景展开
      镜头: 全景→中景，产品使用场景
      情绪: 代入
    - 段: 3
      时间: "10-15秒"
      内容: 功能展示
      镜头: 中景/近景，产品动态使用
      情绪: 信服
    - 段: 4
      时间: "15-20秒"
      内容: 情绪渲染
      镜头: 近景/特写，产品与生活融合
      情绪: 向往
    - 段: 5
      时间: "20-25秒"
      内容: 价值升华
      镜头: 全景/中景，品牌理念
      情绪: 认同
    - 段: 6
      时间: "25-30秒"
      内容: 定版收尾
      镜头: Logo帧+Slogan，产品定格
      情绪: 记忆
  镜头数: "8-15个"
  产品镜头类型:
    - 材质特写
    - 使用场景
    - 品牌Logo帧

短剧:
  名称: 短剧 1-2分钟/集
  结构:
    - 段: 1
      时间: "0-3秒"
      内容: 黄金3秒钩子
      说明: 7种情绪钩子：委屈/心动/遗憾/想念/误会/期待/失落
    - 段: 2
      时间: "3-30秒"
      内容: 第一次小反转
    - 段: 3
      时间: "30-60秒"
      内容: 情绪积累
    - 段: 4
      时间: "60-90秒"
      内容: 关键反转或悬念
  节奏: 每30秒一个情绪刺激点
  镜头数: "20-60个"
  付费卡点:
    卡一: 第8-16集
    卡二: 第25-30集
    卡三: 约第50集

微电影:
  名称: 微电影 5-15分钟
  结构: 三幕式
  序幕:
    占比: 25%
    内容:
      - 建立：人物、世界观、日常状态
      - 激励事件：打破日常的突发事件
      - 转折点：主角做出选择，进入新世界
  发展:
    占比: 50%
    内容:
      - 上升行动：冲突升级，尝试→失败→再尝试
      - 中点转折：重大发现或挫折
      - 至暗时刻：最绝望，一无所有
  结局:
    占比: 25%
    内容:
      - 最终对决：主角vs最大障碍
      - 高潮：决定胜负
      - 结局：新平衡，人物完成弧光
  镜头数: "40-120个"
