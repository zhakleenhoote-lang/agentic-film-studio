      directory: "assets/camera_movements/"
      format: "mp4"
      duration: "5秒/段"
      resolution: "720p"
      codec: "H.264"
      audio: "单声道（即使无音频）"
      naming: "{camera_type_en}_{n}.mp4"
      examples:
        - "dolly_in_01.mp4"
        - "track_01.mp4"
        - "pan_01.mp4"
        - "handheld_01.mp4"
    metadata_fields:
      camera_type: "运镜中文名（如推、拉、摇、移）"
      camera_en: "运镜英文名（如 dolly_in、track、pan）"
      mood: "情绪标签（如接近感、审视、紧张）"
      use_case: "适用场景（如人物情绪变化、场景导览）"
      prompt: "该运镜的 Seedance 2.0 生成 prompt"
      file_path: "assets/camera_movements/{type}_{n}.mp4"
      duration: "5.0"
      fps: "24"
      resolution: "1280x720"
      generated_at: "ISO8601 时间戳"
    # ===== 15 种运镜定义已迁移至独立 SSOT 运镜15项.yaml（07/09 去重）=====
    supported_types:
      reference_knowledge: "skills/knowledge/运镜15项.yaml"
      note: "07/09 去重。原 supported_types 15 种运镜详细定义（camera_type/camera_en/mood/use_case/prompt）已统一到运镜15项.yaml，此处仅保留引用。Agent B 生成运镜参考视频时通过 generate_camera_movement_ref() 动态拼接 prompt（Cinematic {en} movement + mood），不依赖本字段。"
    index_file:
      path: "assets/camera_movements/catalog.yaml"
      description: "运镜预设目录索引，记录每一段参考视频的元数据"
    generation:
      default_model: "doubao-seedance-2-0-260128"
      default_duration: 5
      cost_estimate: "≈¥0.5/段（46元/百万token）"
      batch_cost: "15段 × ¥0.5 ≈ ¥7.5（一次性投入，可跨项目复用）"
      note: "由 Agent B 在项目初期一次性生成，或复用已有预设"

  # ===== ⭐ v4.0 新增：场景卡八维规范 =====
  scene_card_spec:
    description: "场景卡由七维升级为八维，新增第八维 camera_movement_ref"
    dimensions:
      - dimension: 1
        name: "构图"
        type: "description"
        description: "画面元素的位置、比例、视觉引导"
        required: true
      - dimension: 2
        name: "光位"
        type: "description"
        description: "主光/辅光/背光/环境光的方向与强度"
        required: true
      - dimension: 3
        name: "色调"
        type: "description"
        description: "色彩基调、色温、饱和度方案"
        required: true
      - dimension: 4
        name: "焦段"
        type: "description"
        description: "镜头焦距选择（广角/标准/长焦/微距）"
        required: true
      - dimension: 5
        name: "视角"
        type: "description"
        description: "镜头视点（主观/客观/上帝视角/POV）"
        required: true
      - dimension: 6
        name: "景深"
        type: "description"
        description: "画面纵深层次、虚化程度"
        required: true
      - dimension: 7
        name: "运镜描述"
        type: "description"
        description: "镜头运动方式的文字描述"
        required: true
      - dimension: 8
        name: "camera_movement_ref"
        type: "file_reference"
        description: "运镜参考视频文件路径，引用 assets/camera_movements/ 下的预设或 Agent B 新生成的参考视频"
        required: false  # 有预设时推荐使用；无预设时退回到第7维文字描述
        format: "assets/camera_movements/{type}_{n}.mp4"
        fallback: "当第8维为空时，渲染 Agent C 使用第7维文字描述控制运镜"

  # ===== ⭐ v4.0 新增：Agent B 升级规范 =====
  agent_b_upgrade:
    description: "Agent B（故事板资产引擎）的运镜参考视频能力扩展"
    capabilities:
      select_preset:
        description: "从 assets/camera_movements/catalog.yaml 中选择匹配场景情绪/类型的运镜预设"
        output: "场景卡第八维 camera_movement_ref 填入对应文件路径"
        condition: "catalog.yaml 中存在匹配项"
      generate_new:
        description: "当无匹配预设时，调用 Seedance 2.0 API 新生成运镜参考视频"
        model: "doubao-seedance-2-0-260128"
        duration: 5
        resolution: "720p"
        prompt_template: "Cinematic [运镜类型] movement, smooth professional motion, abstract bokeh background, no subject, no people"
        output_dir: "03_资产/camera_movements/"
        metadata: "生成对应 camera_movement_ref.json 元数据文件"
      catalog_output:
        description: "新生成的运镜参考视频同步注册到 assets/camera_movements/catalog.yaml"
    output_files:
      - "03_资产/camera_movements/{type}_{n}.mp4"
      - "03_资产/camera_movements/{type}_{n}_metadata.json"
    integration_note: "Agent B 在场景卡生成阶段完成运镜选择/生成，不新设独立阶段"

  # ===== ⭐ v4.0 新增：Agent C 升级规范 =====
  agent_c_upgrade:
    description: "Agent C（渲染引擎）的运镜参考视频引用扩展"
    prompt_syntax:
      description: "当 Scene Card 包含 camera_movement_ref 时，Agent C 在 API 调用中加入参考视频"
      api_integration:
        - step: "将 camera_movement_ref 文件路径作为 reference_video 传入 API 请求体"
        - step: "在 prompt 中使用 @视频N 的运镜方式 语法引用该视频"
        - step: "多个运镜参考视频分别对应不同的 @视频N 编号"
      priority:
        1: "场景卡第八维 camera_movement_ref 文件"
        2: "场景卡第七维运镜文字描述"
      constraint: "当第八维有值时强制使用其文件引用，不得跳过"
    shot_level_prompt_template:
      example: |
        "将 @视频1 的运镜方式应用到 [主体1] 身上，[主体1] [动作描述]，[场景环境]。"
        "结合 @视频1 的横移运镜和 @视频2 的推镜变焦，展示 [主体1] 从 [位置A] 到 [位置B] 的行走过程。"
    edge_cases:
      - condition: "camera_movement_ref 文件路径不存在或已过期"
        action: "降级使用第7维文字运镜描述，记录降级日志"
      - condition: "多个 camera_movement_ref 超出 reference_video 上限（最多3段，总时长≤15s）"
        action: "优先使用最匹配场景情绪的前3段，剩余降级到文字描述"
      - condition: "camera_movement_ref 视频时长超过5秒"
        action: "Agent C 裁剪至5秒后再引用"
    backward_compatibility:
      description: "现有 v3.0 项目无需修改。场景卡无第8维时自动使用第7维文字运镜描述。Agent C 加载场景卡时检查 camera_movement_ref 是否存在，存在则调用新逻辑，不存在则走原有逻辑。"

  # ===== ⭐ v4.0 新增：段间状态锁定（Phase 7 反例，已迁移到独立 SOP）=====
  segment_state_lock:
    reference_knowledge: "skills/knowledge/段间状态锁定SOP.yaml"
    note: "原 segment_state_lock 完整内容（流程图/sidecar 格式/prompt 模板/冲突检测/Python API/实施清单）迁移至段间状态锁定SOP.yaml，此处仅保留引用避免重复。Phase 7 反例：5段渲染段1陈影脱外套露左臂绷带→段2-5外套穿回/绷带左右漂移/道具状态不连贯。"
