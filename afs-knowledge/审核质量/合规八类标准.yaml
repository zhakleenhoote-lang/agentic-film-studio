# 合规审查八类标准（AI导演 — 共享知识库）
# 来源：广电总局2026年《微短剧发展管理办法》+ M2 课时7-8
# ⭐ v2 (2026-07-12): 关联引用 平台审核规则.yaml（张大马平台预审MVP）

关联规则:
  - skills/knowledge/平台审核规则.yaml  # 四平台社区公约规则（内容+商业+二创雷区）
  - Agent D D-Stage-2.5: 平台合规初审（A完成后触发）
  - Agent D D-Stage-3.5: 资产卡投放合规审核（B完成后触发，融入9/6/8维）

合规标准:
  1:
    类别: 政治/国家安全
    检查项: 危害国家统一、泄露国家秘密、损害国家荣誉和利益
  2:
    类别: 民族/宗教
    检查项: 煽动民族仇恨、民族歧视，宣扬邪教和封建迷信
  3:
    类别: 历史文化
    检查项: 诋毁中华优秀传统文化，歪曲历史，丑化英雄
  4:
    类别: 未成年人
    检查项: 危害未成年人身心健康的内容
  5:
    类别: 人格权益
    检查项: 侮辱诽谤他人，散布他人隐私，侵害合法权益
  6:
    类别: 社会公德
    检查项: 淫秽色情、赌博暴力、毒品、拜金主义、低俗内容
  7:
    类别: 社会秩序
    检查项: 渲染暴力恐怖，教唆犯罪，危害公共安全
  8:
    类别: AI标识
    检查项: AI生成内容须在每集明显位置添加AI提示标识

审查流程:
  - 剧本完成后首先自查
  - 通义千问API复核（作为独立合规审查通道）
  - 不通过则修改剧本，直至全部通过
