# 画质参数模板（AI导演 — 共享知识库）
# 来源：M4 Seedance/可灵视频渲染 课时19-24

画面约束母句: "面部清晰不变形，人体结构比例正常，动作自然流畅连贯，画面稳定无抖动。"

五维提示词架构:
  主体: 谁、什么外貌、穿什么
  场景: 在哪、什么时候、什么环境
  动作: 做什么、怎么做
  镜头/运镜: 怎么拍、什么景别、什么焦段
  质感/光影: 画质+光线+风格+画幅比

电影级Prompt七维:
  格式: 时长、镜头类型
  风格: 视觉参考系（胶片/数字/特定导演风格）
  场景: 空间+时间
  摄影: 镜头+焦距+运动
  灯光: 方向+色温+氛围
  动作: 按节拍描述
  声音: 环境音+拟音+音乐

MASTER_STYLE模板:
  color_palette: [] # >=6个HEX色值
  lighting: {}
  camera: {}
  film_look: ""
  ratio: "16:9"
  fps: 24

渲染参数:
  分辨率:
    - 720P
    - 1080P
    - "4K"
  帧率:
    - 24fps # 电影感
    - 30fps # 流畅
  时长: "5-15秒/镜头 (Seedance 2.0), 30秒 (2.5)"
  双路径:
    图生视频: 角色/场景资产图 → Seedance → 视频片段（含配音+唇形）
    文生视频: 画面约束母句 → Seedance → 视频片段（空镜/过渡镜头）

避坑规则:
  禁止:
    - 主观形容词（"很美""超好看""电影感"）
    - 堆砌多个运镜词
    - 否定式约束（"不要模糊"）
  正确:
    - 具体视觉元素描述
    - 每次只用1个核心运镜词
    - 正向描述（"sharp focus throughout"）
