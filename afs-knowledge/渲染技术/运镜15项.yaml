# 15种运镜类型（AI导演 — 共享知识库）
# 来源：M1 导演思维与视听语言 课时1

运镜类型:
  1:
    中文: 推
    英文: Dolly In / Push In
    情绪: 接近感、紧张加剧、注意力聚焦
    场景: 人物情绪变化、揭示关键信息
  2:
    中文: 拉
    英文: Dolly Out / Pull Out
    情绪: 疏离感、孤独、揭示环境全貌
    场景: 场景收尾、人物关系疏远
  3:
    中文: 摇
    英文: Pan
    情绪: 观察、搜索、视线过渡
    场景: 展示环境、跟随视线移动
  4:
    中文: 移
    英文: Track / Truck
    情绪: 跟随感、空间展示
    场景: 人物行走跟拍、场景导览
  5:
    中文: 跟
    英文: Follow
    情绪: 代入感、紧张感
    场景: 追逐戏、主观视角
  6:
    中文: 升
    英文: Pedestal Up / Boom Up
    情绪: 宏伟、揭示、希望
    场景: 大场面开场、人物觉醒
  7:
    中文: 降
    英文: Pedestal Down / Boom Down
    情绪: 压迫感、沉沦、绝望
    场景: 悲剧场景、权力失势
  8:
    中文: 俯
    英文: High Angle
    情绪: 渺小、弱势、被审视
    场景: 表现人物弱势地位
  9:
    中文: 仰
    英文: Low Angle
    情绪: 高大、权威、仰慕
    场景: 英雄出场、反派威压
  10:
    中文: 旋转
    英文: Dutch Angle
    情绪: 混乱、不安、失衡
    场景: 心理崩溃、梦境、眩晕
  11:
    中文: 变焦
    英文: Zoom In / Out
    情绪: 注意力强制聚焦或抽离
    场景: 快速揭示、紧张突变
  12:
    中文: 晃动
    英文: Handheld
    情绪: 真实感、紧迫、纪录片感
    场景: 战争场面、追逐、主观恐慌
  13:
    中文: 航拍
    英文: Aerial
    情绪: 宏大、史诗感、全局审视
    场景: 开篇定场、城市全景
  14:
    中文: 斯坦尼康
    英文: Steadicam
    情绪: 流畅、沉浸、悬浮感
    场景: 长镜头、舞蹈、仪式
  15:
    中文: 固定
    英文: Static
    情绪: 客观、冷静、观察者视角
    场景: 对话场景、静物展示

