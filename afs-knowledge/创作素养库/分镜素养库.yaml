# =============================================================================
# 分镜素养库 — 供 Agent B 引用
# =============================================================================
# 来源：Emily2040 seedance-2.0-skill-os
#   - directing-engine.md（Shot Language / Coherence / Scene-Type Coverage）
#   - shot-list-continuity.md（Continuity / Handoff / Sequence-State）
#   - dense-storyboard-mode.md（Endpoint Discipline）
#   - pro-filmmaking-standards.md（Professional Spine）
# 本库提供分镜师专业素养，让 B 自然输出"运镜与叙事匹配"的分镜表。
# =============================================================================

metadata:
  version: "1.1"
  created: "2026-07-12"
  last_updated: "2026-07-13"
  service_agent: "B"
  description: "分镜设计所需的镜头语言与连续性专业素养知识库"

# =============================================================================
# 第一章：景别选择 — 距离就是情感
# =============================================================================
shot_size:
  description: "景别不是随便选的。景别=摄影机到主题的距离=观众与角色的情感距离。越近越亲密（观众在角色的身体里），越远越客观（观众在观察）。"

  table:
    - shot: "大远景（Extreme Wide / EW）"
      feeling: "孤独、渺小、世界之大"
      use_when: "建立场景、强调角色在环境中的微小、史诗感"
      avoid_when: "需要观众看清角色表情"
    - shot: "远景（Wide / WS）"
      feeling: "观察、客观、语境"
      use_when: "展示人物与环境的关系、动作发生的空间、入场/出场"
      avoid_when: "情绪密集的对白戏"
    - shot: "中景（Medium / MS）"
      feeling: "正常对话、信息平衡"
      use_when: "日常互动、多角色场景、对话的标准选择"
      avoid_when: "需要放大微表情的瞬间"
    - shot: "中近景（Medium Close-Up / MCU）"
      feeling: "靠近感、注意力聚焦"
      use_when: "重要对白、角色开始有情绪变化的时刻"
      avoid_when: "需要展示环境大背景"
    - shot: "特写（Close-Up / CU）"
      feeling: "极致共情、不容忽视"
      use_when: "情绪转折点、揭示反应、关键道具/细节"
      avoid_when: "观众需要看到周围环境"
    - shot: "大特写（Extreme Close-Up / ECU）"
      feeling: "窒息感、细节放大、内心世界"
      use_when: "极度情绪时刻、文字/微表情/瞳孔反应"
      avoid_when: "轻松的日常场景"

  progression_rule: "在关键情绪场景中，随着情绪上升，景别应逐步收紧（从中景→近景→特写）。在情绪回落时，景别可回到中景/远景（给观众呼吸空间）。趋势一致性：在一个故事弧中，景别变化方向应该可预测（收紧=加压，放宽=释放）。"

# =============================================================================
# 第二章：角度与权力关系 — 镜头高度=关系定位
# =============================================================================
angle_and_power:
  description: "镜头角度表达的不是好看，而是角色之间的权力关系。剧本中的权力分配，直接映射为分镜中的角度选择。"

  table:
    - angle: "平视（Eye-Level）"
      height: "与角色眼睛等高"
      meaning: "平等、共情、对等关系"
      use_when: "对话双方地位相当、想建立正常交流感"
    - angle: "低角度（Low Angle）"
      height: "低于角色视线，向上拍"
      meaning: "赋予力量、高大、威胁性、权威"
      use_when: "角色占上风、变大/变强、压迫感"
    - angle: "高角度（High Angle）"
      height: "高于角色视线，向下拍"
      meaning: "削弱力量、弱势、被命运压制"
      use_when: "角色被压制、弱小、被打败、孩子/小人物"
    - angle: "俯拍（Top-Down / Overhead）"
      height: "正上方"
      meaning: "上帝视角、无感情观察、宿命"
      use_when: "展示格局/位置关系、无力感、抽象化"
    - angle: "荷兰角（Dutch / Canted）"
      height: "镜头歪斜"
      meaning: "不安、混乱、失常"
      use_when: "角色心理失衡、危险逼近、异化世界观"
      avoid_when: "想保持严肃稳定的叙述（过度使用很廉价）"

  power_shift_rule: "当权力在场景中转移时，角度应随之改变。示例：A 训斥 B（A 低角度，B 高角度）→B 反击（角度逐渐对等）→最终 B 占优（B 变低角度，A 变高角度）。角度变化就是权力变化的视觉化。"

# =============================================================================
# 第三章：镜头运动 — 每次移动必须有动机
# =============================================================================
camera_movement:
  description: "镜头移动不是装饰，是叙事选择。一个好看但没理由的运镜是浪费。每个镜头运动都应该回答为什么：为了揭示、追踪、强调或释放。"

  movement_types:
    - movement: "推进（Push In）"
      meaning: "靠近→重要性增加、逼近内心"
      trigger: "角色意识到某件事的重要性、情绪逼近爆发点"
      caution: "过快的推进会失去悬念，慢推更有重量"
    - movement: "后退（Pull Back）"
      meaning: "远离→揭示环境、角色被孤立/放弃、揭示更大的画面"
      trigger: "角色意识到自己很渺小、场景结束前、揭示新的语境"
      caution: "退到失去主题=变成了空泛的空镜"
    - movement: "横移（Track / Dolly）"
      meaning: "跟随→与角色并肩行进，持续关心"
      trigger: "追逐/移动场景、平行关系的长时间展示"
      caution: "横移方向必须一致（screen direction discipline），方向乱=观众迷失"
    - movement: "摇（Pan）"
      meaning: "转头→跟随视线、从A到B的注意力转移"
      trigger: "角色转头看/听到某物、从一个角色反应到另一角色反应"
      caution: "大幅度摇镜头在短时间里容易晕眩"
    - movement: "升降（Crane / Boom Up/Down）"
      meaning: "升高=放大格局/神性视角，降低=缩小/进入细节"
      trigger: "开场建立、结尾收束、格局变化"
    - movement: "手持（Handheld）"
      meaning: "不稳定的存在感=真实感、紧迫感、纪录片感"
      trigger: "追逐、混乱、现实题材、观众被带跑的状态"
      caution: "手持太长会晕+廉价。在关键时刻用，不全程用。"
    - movement: "静止（Locked）"
      meaning: "非常刻意的不动=让观众只能看画面里的内容"
      trigger: "情感重击后需要消化、笑点需要铺垫、强调某个时刻"
    - movement: "斯坦尼康（Steadicam / Gimbal）"
      meaning: "平滑跟随=优雅的持续关注"
      trigger: "长段落跟拍、展示空间关系、舞蹈般的持续动作"

  movement_motivation_rule: "每个分镜必须写清楚镜头的运动动机，不能只写推镜——要写推镜（渲染A意识到信里的内容）。没有动机的运镜=装饰，不产生叙事价值。"

# =============================================================================
# 第四章：视觉节奏 — 段长与运动的关系
# =============================================================================
visual_rhythm:
  description: "分镜的视觉节奏由段长+运镜幅度+段间对比共同决定。一个好的分镜表，读起来应该有呼吸感——有紧有松。"

  principles:
    - id: "vr_1"
      name: "段长与运镜幅度成反比"
      rule: "段越短，运镜应该越简单（静止或小幅横移）；段越长，运镜可以越复杂（推拉+角度变化）。"
      why: "短段没时间让观众看懂复杂运镜；长段需要运镜变化防止无聊。"
    - id: "vr_2"
      name: "节奏图谱"
      rule: "整个分镜表的节奏应该形成一个波形：开场（中速建立）→上升（速度渐快/段渐短/运镜渐动感）→高潮（最快/最短/最动感）→释放（速度回落/段拉长/运镜静止）。"
      example: "爱情场景：中速·静止（建立）→中速·慢推（靠近）→快速·短切（接触）→短·推进（情感高潮）→慢长·后拉（余韵）"
    - id: "vr_3"
      name: "节奏交替"
      rule: "相邻两段的节奏应该可以比较但不要太相似。连续3段同样节奏=观众麻木。推荐模式：快+慢交替，或慢+平+快组合。"
    - id: "vr_4"
      name: "停顿的力量"
      rule: "在最关键的时刻用一段静止的长镜头，比任何运镜都有力。"
      example: "整场戏都在追逐（手持+快切），最后一刻突然静止在A回头——这种对比就是节奏的力量。"

# =============================================================================
# 第五章：连续性规则 — 让观众不迷失
# =============================================================================
continuity:
  description: "分镜表的连续性决定观众的空间感知是否连贯。剪接时，观众会下意识判断空间关系和视线关系。如果分镜没有考虑连续性，后期就是灾难。"

  rules:
    - id: "c_1"
      name: "180度法则"
      rule: "保持摄影机在角色/动作轴线的同一侧（180度线）。跨过这条线=观众会迷失方向（B刚才在左边怎么突然到右边了）。可以故意跨线表示混乱/失控，但需要知道自己在做什么。"
    - id: "c_2"
      name: "视线匹配（Eyeline Match）"
      rule: "A 看着画外左方→切到B看着画外右方（相对方向）→观众理解他们在对视。如果A看左→切到B也看左→B像是在看另一个方向的人。"
      cross_rule: "被看的人的身位决定方向。A在B左边→A看右，B看左。"
    - id: "c_3"
      name: "屏幕方向一致性（Screen Direction）"
      rule: "角色朝一个方向走（从左到右），下个镜头也必须从左到右。如果突然从右到左→观众理解他折返了。用于动作/追逐场景最严格，用于对话场景较宽松。"
      example: "A从左往右跑→切B从右往左跑→观众理解他们在靠近。"
    - id: "c_4"
      name: "道具与服装连续性"
      rule: "分镜表必须记录每个角色的关键道具/服装状态（手中有无包、衣服有没有穿好、头发是否乱了、有没有伤痕）。上段结束的状态=下段开始的状态。"
      technique: "每段标注starting state和end state。"
    - id: "c_5"
      name: "光线状态连续性"
      rule: "一场戏内的光线方向应保持一致（主光方向、时间感、色温）。大晴天→大阴天转场之间要有过渡（除非故意，如时间跳跃）。"
    - id: "c_6"
      name: "端点原则（Endpoint Discipline）"
      rule: "每个段必须结束在一个完整的视觉状态。如果端点不可见（半途/模糊），下一个段无法安全继承。分镜表必须有明确的结束状态描述，不能是继续动作中。"
      bad_example: "A 伸手拿杯子（未完成，下段不知道手的位置）"
      good_example: "A 拿起了杯子，握在手里（完成状态，下段确定手中有杯）"

# =============================================================================
# 第六章：转场技法 — 段与段之间的桥梁
# =============================================================================
transitions:
  description: "段与段之间的衔接决定了整个作品的流畅度。好的转场观众不会注意到；不好的转场每次都会把观众拉出故事。"

  techniques:
    - technique: "硬切（Hard Cut）"
      description: "最简单的切——上段结束，下段开始"
      use_when: "大多数情况下，最自然、最不打扰；两段之间信息/情感连贯"
    - technique: "动作匹配（Match Cut on Action）"
      description: "上段的动作结束状态=下段的开始动作"
      use_when: "连续动作（如A拉开门→切到门外的镜头）"
    - technique: "视线切（Look Cut）"
      description: "A看→切到A看到的东西"
      use_when: "揭示/发现场景，让观众跟着A看到"
    - technique: "节奏切（Rhythm Cut）"
      description: "在动作的拍上切——跳起→最高点切落地的瞬间"
      use_when: "动作戏，切在发力点上增加冲击感"
    - technique: "空镜过渡（Cutaway）"
      description: "从主要动作切到一个环境细节/环境全景再切回来，表示时间流逝"
      use_when: "时间跳跃、情绪缓冲、节奏变化"
    - technique: "声音搭桥（J-Cut / L-Cut）"
      description: "画面对白提前出现在前一段末尾（J-Cut），或前段声音延续到下段开头（L-Cut）"
      use_when: "对话场景、角色内心独白、环境声跨段连接"
      note: "视频生成不易精确控制J/L-Cut，但在剧本阶段标注可提示后期"
    - technique: "抹黑（Fade to Black）"
      description: "画面渐隐到黑，然后渐显"
      use_when: "大段落结束、时间大幅跳跃、情感落地"
    - technique: "叠化（Dissolve）"
      description: "上段画面淡出的同时下段画面淡入"
      use_when: "时间流逝、梦境切换、怀旧/回忆"

  transition_rules:
    - "同一个场景内的段落之间：优先用硬切或动作匹配"
    - "不同场景之间的切换：可适当用叠化/抹黑表示时间和空间的转换"
    - "转场不做装饰：不要为了炫而用复杂的转场（如旋转/3D翻页）——那些出戏"
    - "竖屏短剧建议：硬切为主，快节奏不需要太多转场花样"

# =============================================================================
# 第七章：场景类型与分镜方案 — 不同戏剧功能的镜头策略
# =============================================================================
scene_type_shot_strategy:
  description: "这个表格是对应剧本素养库.yaml第七章的场景类型的分镜侧方案。Agent B读到一个场景类型时，优先参考对应的分镜策略。"

  table:
    - scene_type: "亲密对话"
      shot_strategy: "中近景→特写，平视，长焦（压缩感），极少运镜"
      performance_focus: "微行为：一个停留的眼神、咽下的话、出卖冷静的手指"
      camera_focus: "最小化运动——一个极慢的推进或几乎没有"
      slop_to_refuse: "运动镜头的干扰和太宽的取景（失去亲密感）"
    - scene_type: "对抗/权力冲突"
      shot_strategy: "正反打交替镜头，用高度差编码地位，长焦隔离双方"
      performance_focus: "静止=有控制；失态=权力转移"
      camera_focus: "角度变化随权力流动——占上风=低角度，失势=高角度"
      slop_to_refuse: "对称的中性构图（抹去权力差距）"
    - scene_type: "揭示/发现"
      shot_strategy: "先是遮挡/隐藏的构图，然后用移动或光线变化揭露"
      performance_focus: "反应就是全片——拍演员的识别瞬间，不要拍被发现的物品"
      camera_focus: "摄影机与角色一起发现，不要先于角色揭示"
      slop_to_refuse: "一上来就把所有信息展示出来（没有保留）"
    - scene_type: "决策/转折点"
      shot_strategy: "推进到特写把决策者孤立；周围声光渐弱"
      performance_focus: "一个决定性的身体动作——有明确之前和之后"
      camera_focus: "推进在说这个决定很重要，但推进不能太快"
      slop_to_refuse: "用对白说我决定了"
    - scene_type: "到达/建立"
      shot_strategy: "远景过渡到中景，镜头从一个环境移动到一个角色"
      performance_focus: "远距离就能读出的步态/姿态所暗示的地位和意图"
      camera_focus: "镜头找到角色=观众对这个世界的理解有了锚点"
      slop_to_refuse: "漂亮但空洞的风景套图——环境和人的关系是核心，不是空镜"
    - scene_type: "追逐/动作"
      shot_strategy: "跟踪/手持动态，严格的屏幕方向，每段一个物理目标"
      performance_focus: "体力消耗可见——喘息、踉跄、闪躲"
      camera_focus: "屏幕方向绝对不能乱；追逐中所有镜头同向运动"
      slop_to_refuse: "多动作堆叠在一个段里=混乱"
    - scene_type: "转变/效果"
      shot_strategy: "固定或受控的镜头让变化可读；光线追踪变化；一个因一个果"
      performance_focus: "角色对变化的反应比变化本身重要"
      camera_focus: "锁定画面的目的：让观众不会错过任何细微变化"
      slop_to_refuse: "光变和特效本身成了全部，没有角色反应做锚点"
    - scene_type: "喜剧/笑点"
      shot_strategy: "固定镜头、清晰的空间关系、毫无表情的沉默长拍"
      performance_focus: "完全投入的表演+克制——让画面在正常持续过久后再揭晓笑点"
      camera_focus: "镜头不动=笑点的沉默空间不能被打断"
      slop_to_refuse: "忙碌的镜头抢了节奏"
    - scene_type: "情绪低点"
      shot_strategy: "远景（距离感）或中景，静止，负空间，几乎无声"
      performance_focus: "最小真正的动作——不宣泄，不爆发，就是待着"
      camera_focus: "摄像机在观察，不是在推进——让悲伤有空间"
      slop_to_refuse: "用音乐/镜头运动来渲染情绪（打扰了孤独）"
    - scene_type: "产品展示"
      shot_strategy: "从环境到细节的受控移动→产品核心，受控打光，清晰的身份保持"
      performance_focus: "如果有人物，一个真实的使用动作"
      camera_focus: "慢速移动呈现产品的质感与细节，不要急"
      slop_to_refuse: "动态产品镜头——标签变形、形状不稳定"

# =============================================================================
# 第八章：视角选择 — 观众的眼睛长在谁身上
# =============================================================================
pov_selection:
  description: "观众通过摄影机体验故事。分镜的视角选择决定了观众的信息获取方式和共情对象。"

  pov_types:
    - type: "客观视角（Objective / Fly-on-the-Wall）"
      description: "观众像一只墙上的苍蝇，看到所有角色，但不在任何人心里"
      use_when: "广泛建立、多角色大场景、需要观众冷静判断"
    - type: "主观视角（Subjective / POV）"
      description: "观众借用角色的眼睛看——看到的就是角色看到的"
      use_when: "悬疑（不知道背后有什么）、极致共情、揭示/发现"
      caution: "视频生成中纯POV镜头容易迷失，通常嵌入客观视角使用"
    - type: "过肩视角（Over-the-Shoulder / OTS）"
      description: "观众站在角色的肩膀后面看到前方的另一个角色"
      use_when: "对话场景——观众在听A说话时站在B旁边"
      meaning: "观众被定位在某个角色的空间里（有偏向）"
    - type: "第三人称限制视角（Third-Person Limited）"
      description: "观众跟着一个角色的行踪和感受，但不在其身体里"
      use_when: "整部作品的主流视角——观众跟A走，但不进A的头"
      meaning: "观众知道A知道的信息，不知道A不知道的信息"

  pov_shift_rule: "一场戏内不要频繁切换视角归属。典型模式：整场戏锁定一个角色的限制视角，只在特别时刻切客观观察。频繁切换=观众不知道代入谁的感受=情感悬浮。"

# =============================================================================
# 第九章：分镜表字段规范
# =============================================================================
shot_list_fields:
  description: "Agent B 输出分镜表时，每个段应该包含完整的以下字段。这确保分镜表可以被 Agent C 渲染时直接解析使用。"

  fields:
    - field: "镜头编号（Shot ID）"
      format: "S{场景序号}_SH{镜头序号}（如S01_SH03）"
      required: true
    - field: "时长（Duration）"
      example: "4s"
      required: true
    - field: "景别（Shot Size）"
      options: "EW / WS / MS / MCU / CU / ECU"
      required: true
    - field: "角度（Angle）"
      options: "Eye-Level / Low / High / Top-Down / Dutch"
      required: true
    - field: "运镜（Camera Movement）"
      description: "Push In / Pull Back / Track / Pan / Crane / Handheld / Locked"
      motivation: "必须附动机（如推镜—反映她意识到……）"
      required: true
    - field: "核心动作（Action）"
      description: "该段角色做什么。必须是可表演的可见动作。"
      required: true
    - field: "结束状态（End State）"
      description: "本段结束时角色/道具/场景的视觉状态"
      required: true
    - field: "参考信息（References）"
      description: "参考图/视频的索引"

# =============================================================================
# 第十章：常见的分镜错误与避免
# =============================================================================
common_mistakes:
  description: "分镜阶段容易犯的错误，Agent B 生成后自查。"

  mistakes:
    - id: "m_01"
      mistake: "运镜无动机"
      description: "分镜写了推镜但没说明为什么推——推镜要服务于揭示/强调"
      fix: "每段运镜后面写括号注释动机"
    - id: "m_02"
      mistake: "景别太均匀"
      description: "整场戏全是中景或全是特写，节奏没有对比"
      fix: "节奏高峰用特写/近景，低谷用中景/远景——制造变化"
    - id: "m_03"
      mistake: "角度与情绪不匹配"
      description: "一场悲伤的戏用低角度（低角度=权力，和悲伤的情绪不符）"
      fix: "检查每个角度选择是否服务于情感和权力关系，而不是这样好看"
    - id: "m_04"
      mistake: "连续段无连续性标注"
      description: "两个连续段之间没有标注服装/道具/光线是否延续"
      fix: "每个段加起始状态和结束状态字段"
    - id: "m_05"
      mistake: "段内动作过多"
      description: "一个4秒段内写了4个独立动作——观众看不清"
      fix: "每段只装1-2个动作，多的动作拆到下一段"
    - id: "m_06"
      mistake: "同一场景内屏幕方向不一致"
      description: "第一段A从左向右走，第三段A从右向左走，观众以为他在折返"
      fix: "锁定screen direction，有变化时标注折返"
    - id: "m_07"
      mistake: "摄影机先于角色揭示信息"
      description: "角色还没看到的东西，镜头先拍到了——降低了悬念"
      fix: "摄影机与角色同时发现，或跟随角色发现"
    - id: "m_08"
      mistake: "密集对白段没有动作间隙"
      description: "一个持续对白的段全是说话没有动作，画面枯燥"
      fix: "在对白中间插入反应/动作/环境细节的切换"

# =============================================================================
# 第十一章：扩展性备注
# =============================================================================
extensibility:
  description: "本知识库可扩展。以下为各章节建议扩展方向。"

  proposed_extensions:
    - section: "第一章·景别"
      todo: "可加竖屏vs横屏的景别适应表"
    - section: "第三章·镜头运动"
      todo: "可加运动速度分级（慢推/中速/快推）及适用场景"
    - section: "第五章·连续性"
      todo: "可加更详细的连续性追踪模板表"
    - section: "第七章·场景类型分镜方案"
      todo: "可加二级类型（如对抗拆分为上对下vs平级冲突）"
    - section: "第八章·视角"
      todo: "可加多角色群戏的视角切换策略"
    - section: "第十章·常见错误"
      todo: "可基于Agent C渲染失败原因不断补充"
# =============================================================================
# 第十二章：角色一致性硬约束
# =============================================================================
character_consistency_hard:
  description: "Agent B 角色图必须保持单角色多图完全一致。越界=角色分裂（人脸≠全身=反例）。这是 Phase 7 反例修复的核心。"
  
  principle: "中国/东亚脸 + i2i 模式。第一张图（人脸特写）独立 t2i 生成，第二张图（全身）必须 i2i 基于第一张图生成。多角色（>1）时，每个角色的全身图都基于该角色的人脸特写生成。所有 prompt 首位必加 'Chinese/East Asian' 硬约束。"
  
  counter_example:
    - scenario: "Phase 7 反例"
      what_happened: "4 张图（人脸特写×2 + 全身×2）独立 prompt 漂移"
      consequence: "陈影的人脸特征与全身特征不匹配→渲染中出现'双胞胎'→ID 分裂"
      fix: "4 张图都用 t2i 独立生成，没有 i2i 锁脸→角色脱钩"
  
  good_example:
    - stage_1: "人脸特写（t2i 独立生成）"
      prompt: "Chinese / East Asian male, ... shoulder-up, neutral expression..."
      tool: "通义万相 2.5 t2i"
    - stage_2: "全身正面（i2i 基于人脸特写）"
      prompt: "Chinese / East Asian male, ... full body, standing pose..."
      tool: "Seedream 5.0 或 IP-Adapter（通义万相 2.5 不支持 i2i）"
      reference: "基于 Stage-1 的人脸特写图"
    - stage_3: "关键帧（i2i 基于人脸特写或全身）"
      prompt: "Chinese / East Asian male, ... in scene, action pose..."
      tool: "Seedream 5.0 或 IP-Adapter"
      reference: "基于 Stage-1 的人脸特写图 + Stage-2 的全身图"
  
  technical_constraints:
    - constraint: "通义万相 2.5 API 不支持 i2i → 改用 Seedream 5.0（支持 i2i + 人脸一致性）"
    - constraint: "或用 IP-Adapter 锁脸方案"
    - constraint: "所有 prompt 首位必含 'Chinese / East Asian'（或对应中文）"
    - constraint: "人种字段必须在角色卡中显式声明（Chinese/Asian/Caucasian/...）"
    - constraint: "服装锚点（颜色/款式/材质）、伤疤/装饰锚点（位置/形状/描述）必须在角色卡中记录"
  
  roles:
    - "角色卡九维**必须包含**以下字段，作为角色一致性锚点："
    - "人种（Chinese/East Asian/...）"
    - "皮肤色调描述"
    - "服装锚点（颜色/款式/材质）"
    - "伤疤/装饰锚点（位置/形状/描述）"
  
  relationship_to_other_chapters:
    - "与第1章（景别选择）配合：人脸特写用 CU/ECU，全身用 WS/LS"
    - "与第5章（连续性规则）配合：道具与服装连续性——上段结束状态=下段开始状态"
    - "与第10章（常见分镜错误）配合：m_02 景别太均匀→人脸特写与全身交替自然形成景别对比"
    - "Agent B SKILL.md ⚠️ 角色一致性硬约束 + ⚠️ 关键帧人种硬约束"

# ==== 第十二章结束 ====
# =============================================================================
# 第十三章：投放合规维度
# =============================================================================
compliance_dimensions:
  description: "合规先于创意。Agent B 产出资产卡时必须检查角色卡第10维、道具卡第7维、场景卡第9维的投放合规风险。不通过=Agent D D-Stage-3.5 打回。"
  
  principle: "所有视觉资产在渲染前必须经过投放合规检查。角色/道具/场景三类资产各有合规维度，缺任一维度即视为不合格。合规不是创意限制，而是投放门槛——不合规=无法发布。"
  
  counter_example:
    - scenario: "角色卡缺年龄合规"
      what_happened: "角色设定为 16 岁女学生，未标注年龄合规→被平台判定为未成年人高风险"
      consequence: "整条片子被下架+账户警告"
    - scenario: "道具卡含真实品牌 LOGO"
      what_happened: "场景中出现未授权的 Starbucks 杯→版权投诉"
      consequence: "片段被屏蔽，需重渲染"
    - scenario: "场景卡出现未授权地图"
      what_happened: "场景背景出现不完整/错误的中国地图轮廓"
      consequence: "政治红线违规→账户永久封禁"
  
  good_example:
    - asset_type: "角色卡（第10维）"
      checks:
        - age: "年龄合规——角色≥18岁 / 未成年人场景合规处理"
        - clothing: "服饰合规——裸露度 / 歧视性标识 / 仿军警制服 / 未授权品牌LOGO / 政治敏感图案"
        - image: "形象合规——不侵犯肖像权 / 不涉及敏感人物 / 不歧视性刻板印象 / AI标注"
      output: "角色卡 v10_投放合规 字段"
    - asset_type: "道具卡（第7维）"
      checks:
        - restricted: "道具雷区——枪支弹药/管制刀具/爆炸物/毒品/烟草/三无产品/野生动植物/人民币/证件/国家象征物"
        - trademark: "商品化标识——品牌LOGO授权 / 虚构品牌不与真实混淆 / 未授权明星形象 / AI标注"
      output: "道具卡第7维 投放合规字段"
    - asset_type: "场景卡（第9维）"
      checks:
        - venue: "场所合规——夜店/医院/学校/未成年人场所/宗教场所/军事场所"
        - public: "公共标识——错误地图/错误地名/未授权品牌广告/政治敏感内容/歧视性语言/广告法"
      output: "场景卡第9维 投放合规字段"
  
  compliance_checklist:
   角色卡:
      - "□ 年龄≥18岁（或在合规前提下处理未成年人场景）"
      - "□ 服饰无裸露过高/歧视性标识/仿军警制服"
      - "□ 未使用真实人物肖像/敏感人物形象"
      - "□ 无歧视性刻板印象"
      - "□ AI 生成内容已标注"
   道具卡:
      - "□ 无枪支弹药/管制刀具/爆炸物/毒品/烟草"
      - "□ 无三无产品外观"
      - "□ 无人民币/证件/国家象征物"
      - "□ 品牌LOGO已模糊化或替换为虚构品牌"
      - "□ 未侵犯明星肖像权"
   场景卡:
      - "□ 无夜店/医院/学校等敏感场所正脸展示"
      - "□ 无未成年人场所"
      - "□ 无宗教场所/军事场所内部展示"
      - "□ 地图为中国标准地图（完整/正确）"
      - "□ 无未授权品牌广告牌/路牌"
  
  relationship_to_other_chapters:
    - "与第10章（常见分镜错误）配合：合规检查应在分镜错误自查后执行"
    - "Agent B v6: 角色卡第10维/道具卡第7维/场景卡第9维硬指标"
    - "Agent D D-Stage-3.5: 资产卡投放合规审核"

# ==== 第十三章结束 ====
