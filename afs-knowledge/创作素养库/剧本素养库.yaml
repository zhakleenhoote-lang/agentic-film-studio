# =============================================================================
# 剧本素养库 — 供 Agent A 引用
# =============================================================================
# 来源：Emily2040 seedance-2.0-skill-os directing-engine 方法论
# （MIT，专业电影制作行业方法论提炼）
# 本库不提供硬规则（如"5秒≤1句"），而是提供导演专业素养，
# 让 A 自然写出"段长与剧情匹配、冲突设计有层次"的剧本。
# =============================================================================

metadata:
  version: "1.1"
  created: "2026-07-12"
  last_updated: "2026-07-13"
  service_agent: "A"
  description: "剧本创作所需的导演专业素养知识库"

# =============================================================================
# 第一章：导演五问 — 写任何场景前回答这 5 个问题
# =============================================================================
director_read_5q:
  description: "在写一个场景之前，先回答这 5 个问题。答案不是形容词，而是决定剧本一切下游选择的驱动因素。这 5 个问题缺一不可——只有全回答完，场景才算可拍摄。"

  questions:
    - id: "q1_function"
      question: "功能（Function）——这个场景在整个故事里是做什么的？"
      options:
        - "引入（introduce）：介绍角色、世界观、核心冲突"
        - "深化（deepen）：推进已有冲突，揭示新层次"
        - "转折（turn）：故事方向发生改变"
        - "收束（pay off）：兑现前期铺垫的情节"
      principle: "一个值得存在的场景必须改变某种状态。如果去掉这个场景故事还能讲通，那就该删掉或合并。"
      counter_example: "两人喝咖啡闲聊（无功能）"
      good_example: "两人喝咖啡，A 把辞职信推过来（功能=关系转折）"

    - id: "q2_turn"
      question: "翻转（The Turn）——这个场景结束时，什么东西变了？"
      principle: "每个场景需要在单一价值轴上发生翻转：安全→威胁，希望→绝望，陌生→盟友，掌控→无力，平凡→震撼。如果一个场景结束时没有任何东西翻转，它就是装饰性场景。"
      counter_example: "他们聊了很久，然后各自回家（无翻转）"
      good_example: "一开始 A 自信满满要赢回 B，但 B 亮出戒指——自信→崩溃"

    - id: "q3_pov"
      question: "视角与共情（POV & Empathy）——观众的身体站在谁的位置感受？"
      principle: "共情是一种物理位置，然后才是一种镜头选择。确定这场戏观众的代入对象是谁——不是上帝视角，而是贴在谁的肩膀看这场戏。确定了视角，景别/角度/信息量自然确定。"
      counter_example: "观众看到所有角色（上帝视角，观众无法共情任何一个）"
      good_example: "这场戏观众跟 A 站在一起，看 B 的反应，不知道 B 在想什么"

    - id: "q4_power"
      question: "权力（Power）——谁有权力？谁想争权？权力怎么流动？"
      principle: "权力通过以下方式表达：身高（高/矮）、大小（近/远）、谁看谁（看=权力）、谁占据空间（被推到边缘=弱者）。每场戏开始时要明确权力分配，结束时权力是否/如何转移。"
      counter_example: "两人面对面站着，镜头来回切（权力关系模糊）"
      good_example: "开始时 A 站 B 坐着（A 占上风）；结束时 A 坐下 B 站起来（权力翻转）"

    - id: "q5_subtext"
      question: "亚文本（Subtext）——什么是真的但没有说出口？"
      principle: "角色说的话和他的真实欲望之间的差距，就是亚文本。亚文本是表演存在的空间。写对白时，不要让人物说出自己的真实感受——让人物用别的事来掩饰真实意图。观众读得懂。"
      counter_example: "A 说我很生气因为你背叛了我（无亚文本，平铺直叙）"
      good_example: "A 说：你衬衫扣子扣错了（B 刚偷情回来。两个人都知道 A 知道了。）"

# =============================================================================
# 第二章：一致性原则 — 一个意图，所有元素奏同一个调
# =============================================================================
coherence_principle:
  description: "一致性原则是剧本/导演工作的核心法则：一个场景只有一个核心意图，所有创作元素都服务于这个意图。剧本中的每一个要素（对白密度、画面描述、节奏、时长）应该共同指向这个意图。"

  how_to_apply:
    - step: "写场景前，先用一句话概括观众在这个场景里应该感受到什么"
      example: "让观众感受到 A 的自信正在瓦解"
    - step: "检查场景中的每个要素是否指向这个意图"
      check_aligned: "如果意图是自信瓦解：对白=说话开始结巴/重复（非自信行为）；动作=手在抖、转杯子；节奏=开场快→中间慢→最后更慢"
      check_misaligned: "如果意图是自信瓦解但写了：A 滔滔不绝讲故事（说得太多反而在掩饰，这个可以用）；A 昂首挺胸走出门（与意图冲突）"
    - step: "所有不自洽的元素必须改掉，不能保留"
      warning: "每个元素单独看没问题，但指向不同方向=拼凑感。宁可损失一个精彩但方向不一致的对白，也要保住整体一致性。"

  script_elements_table:
    - element: "对白密度"
      carries: "角色状态与节奏"
      intention_example: "紧张时对白短促/断裂；放松时对白绵长/跳跃"
    - element: "场景时长"
      carries: "场次重量"
      intention_example: "关键转折场景要长（给观众消化时间）；过渡场景要短"
    - element: "动作描写"
      carries: "情绪与亚文本"
      intention_example: "内心波动写动作（转杯/来回走/突然停），不写内心独白"
    - element: "信息量密度"
      carries: "认知负荷"
      intention_example: "高潮场景信息密度低（专注感受）；开场场景信息密度高（建立世界）"
    - element: "节奏曲线"
      carries: "观众呼吸"
      intention_example: "紧张→释放→再紧张→更大释放；避免全程高能或全程平铺"

# =============================================================================
# 第三章：段长选择原则
# =============================================================================
segment_length:
  description: "视频生成中的段（clip）类似电影中的镜头（shot）。段长不是随意定的，而是由场景功能+信息量+节奏共同决定。"

  principles:
    - id: "sl_1"
      name: "叙事重量决定段长"
      rule: "越重要的剧情节点，段越长。轻量过渡=2-3秒；关键情绪=5-8秒；重大转折=8-12秒。"
      why: "观众需要时间处理情感。一个3秒的她发现丈夫出轨，观众还没反应过来就结束了。而3秒的她走进咖啡店正好合适。"
      example_short: "A 走进办公室（3秒，过渡，只说有点紧张）"
      example_long: "A 看到桌上的信，慢慢坐下，拿起来，沉默读完，放下（8秒，重大揭示）"

    - id: "sl_2"
      name: "信息密度控制"
      rule: "每段信息<3个独立动作/视觉事件。观众在一段短视频（2-8秒）内能处理的信息有限。信息密度高=节奏快（适合动作/追赶）；信息密度低=节奏慢（适合情感/悬疑）。"
      counter_example: "一个5秒段里写了A走进房间、坐下、拿出手机、看到消息、表情变化、站起、冲出去——7个动作，观众来不及看。"
      solution: "拆成两段：①A走进坐下→②A看消息后冲出去。如果必须在一个段里，只保留主干（走进→看→站起），省略中间动作。"

    - id: "sl_3"
      name: "节奏交替律"
      rule: "长段后紧跟短段（或相反），形成节奏对比。连续3个长段→拖沓；连续3个短段→疲劳。推荐模式：短→短→长→短→中→长"
      why: "节奏交替让观众有呼吸空间，注意力更集中。"

    - id: "sl_4"
      name: "亚文本所需观察时间"
      rule: "如果一段的核心信息藏在亚文本（角色的微表情/小动作/沉默），段长至少需要4-5秒——观众需要时间来'看穿'角色的掩饰。"
      example: "A 说我没事，同时手在抖→需要4-5秒让观众看完说话→看到手抖→意识到矛盾"

# =============================================================================
# 第四章：对白排布原则
# =============================================================================
dialogue_distribution:
  description: "视频生成的每段（clip）时长有限，对白排布需遵循以下原则。"

  principles:
    - id: "d_1"
      name: "对话密度与段长匹配"
      rule: "2-3秒段：最多1句短对白（5-8字）。4-5秒段：最多2句对白（10-15字总长）。6-8秒段：最多2-3句对白，必须留出沉默/动作间隙。8秒+段：可容纳一段完整对话，但至少保留20%时长的沉默/反应。"
      why: "观众需要时间看画面+读字幕+看表演。全对白没有画面信息空间。"

    - id: "d_2"
      name: "对白不是传递信息的唯一方式"
      principle: "一个关键信息如果是看的比说的更有效，就写成动作。一个人知道消息后瘫坐在地，比他说天哪更有力。一个人偷偷把药藏起来，比他说别告诉医生更有效。"
      bad_example: "A 说：等等，我得走了。"
      good_example: "A 看表，表情从放松变紧张，抓起包就走。——对白零字，信息量更大。"

    - id: "d_3"
      name: "亚文本原则（写对白）"
      principle: "角色在说A的时候，观众在读B。对白的张力来自角色的口是心非：角色说的和他真正想说/做的之间的差距。没有亚文本的对白=信息传递（旁白）；有亚文本的对白=戏剧。"
      bad_example: "我还想你。（直白，无亚文本）"
      good_example: "你头发剪了。挺好的。（嘴上说头发，心里说'我注意到你了'）"

    - id: "d_4"
      name: "悬停留白"
      principle: "情感高潮的对白结束后，为画面留1-2秒的沉默。这个沉默是观众消化情绪的时间，也是演员表演反应的时间。很多短剧的问题就是对白砸完马上切下一段——观众情绪没有着陆。"

# =============================================================================
# 第五章：亚文本—行为转化
# =============================================================================
subtext_to_action:
  description: "视频生成只能渲染看得见的行为，不能渲染心情。剧本里的人物状态（伤心/愤怒/不安）必须转化为肉眼可见的动作。"

  principle: "不要写情绪名词，写证明情绪的那个唯一的身体动作。如果一段画面描述里出现悲伤地/愤怒地/紧张地，说明还没完成从亚文本到行为的转化。"

  emotion_to_behavior_table:
    - emotion: "悲伤"
      not: "她悲伤地看着窗外"
      instead: "她把信折好，用双手压平，放在桌上，没有抬头"
    - emotion: "愤怒但忍耐"
      not: "他压抑着愤怒"
      instead: "他深吸一口气，放开了握紧的拳头，声音平静得不像自己"
    - emotion: "不安"
      not: "他显得很不安"
      instead: "他的手指无意识地转着杯子，眼睛没有焦距地看着桌面"
    - emotion: "紧张"
      not: "她紧张地等待"
      instead: "她咽了一下口水，把汗湿的手心在裙子上蹭了蹭"
    - emotion: "惊喜"
      not: "她很惊喜"
      instead: "她愣住了，嘴巴微张，手里的包掉在地上"

  rule_of_thumb: "写完一段动作描述后，检查每个动词——如果换成表演这个词演员能做出来，就合格了。如果演员不知道怎么表演这个词（如氛围/情绪），就要改成动作。"

# =============================================================================
# 第六章：冲突设计与价值翻转
# =============================================================================
conflict_design:
  description: "冲突是戏剧的动力来源。每个场景的冲突应满足以下三个层次："

  levels:
    - level: 1
      name: "外部冲突"
      description: "角色与角色之间的对抗（A 想走，B 想留）"
      example: "A 要辞职，B 不同意。——外部冲突清晰，观众知道谁想要什么。"
    - level: 2
      name: "内部冲突"
      description: "角色自己内心的矛盾（A 想走但又舍不得）"
      example: "A 说着要辞职的理由，但手一直在转婚戒。——内外冲突同时呈现。"
    - level: 3
      name: "亚文本冲突"
      description: "说的和真的之间的冲突（A 说没事但行为说有事）"
      example: "A 说我没生气，但转身时动作僵硬，关门时很轻（克制=有情绪）。观众读到了嘴上没事，身体有事的层次。"

  value_flip_rule: "每个场景结束时，在某个价值轴上发生+到-或-到+的翻转。没有翻转=这个场景可有可无。允许的翻转轴（选择一个焦点）：安全↔威胁，希望↔绝望，信任↔怀疑，掌控↔无力，亲密↔疏远，自信↔崩溃，探索↔确认。"

  three_act_structure:
    act_1:
      name: "第一幕：建立"
      duration_ratio: "约25%"
      beats:
        - "建立世界观与主角日常"
        - "激励事件（Inciting Incident）：打破日常"
        - "主角做出第一个选择（不能回头）"
      segment_pacing: "中速偏快——信息密度高，1-2段建立世界观，然后用一段制造悬念"
    act_2:
      name: "第二幕：对抗"
      duration_ratio: "约50%"
      beats:
        - "上升冲突：小胜→大挫→绝境"
        - "中点转折（Midpoint）：最乐观/最悲观时刻"
        - "一无所有时刻（All Is Lost）"
      segment_pacing: "慢→快→慢。高潮前慢（积累张力），高潮快（宣泄），高潮后慢（消化）"
    act_3:
      name: "第三幕：解决"
      duration_ratio: "约25%"
      beats:
        - "高潮对决"
        - "结局（新常态展露）"
      segment_pacing: "短段密集（高潮节奏快）+最后长段（宁静/余韵）"

# =============================================================================
# 第七章：场景类型覆盖 — 不同戏剧功能的分段策略
# =============================================================================
scene_type_coverage:
  description: "不同的场景类型，对分段长度、对白密度、内容容量有不同的要求。以下直接对应 Agent A 的剧本段落设计。"

  scene_types:
    - type: "亲密对话（Intimate Dialogue）"
      question: "观众进谁的内心？"
      segment_strategy: "中长段（4-6秒/段），单段装1-2句对白+沉默+微动作"
      slop_to_refuse: "在亲密对话里塞多个角色来回切换→失去亲密感"
      example: "两人坐在沙发上，A 说话时镜头不动，B 沉默微动眼神——不加复杂走位"

    - type: "对抗/权力冲突（Confrontation）"
      question: "权力在哪里？哪里转移？"
      segment_strategy: "交替短段（2-4秒/段），单段一个立场，用段间节奏表现来回攻防"
      slop_to_refuse: "写成长篇争论导致段内信息过密"
      example: "A:3秒→B反应:2秒→A逼近:3秒→B退让:3秒——用段数模拟交锋节奏"

    - type: "揭示/发现（Reveal/Discovery）"
      question: "观众在什么时机知道了什么？"
      segment_strategy: "先慢后快——揭示前用长段蓄势（让观众猜），揭示后用短段排山倒海（感观冲击）"
      slop_to_refuse: "一上来就把重要信息全展示出来（没有悬念）"
      example: "A 慢慢打开抽屉（3秒）→看到什么东西（冻结2秒）→B 进门（1秒节奏加速）"

    - type: "决策/转折点（Decision/Turning Point）"
      question: "这个选择代价是什么？"
      segment_strategy: "中长段（5-7秒），聚焦在决策者的身体动作——一个决定性的动作胜过10句对白"
      slop_to_refuse: "让角色用对白说我决定了"
      example: "A 拿着烟看了很久，然后把烟按灭（=决定），拿起电话——不说一句话"

    - type: "到达/建立（Arrival/Establishing）"
      question: "这个世界是什么样的，角色在这个世界里的位置是什么？"
      segment_strategy: "中长段（4-6秒），先环境后人物——先给观众看到一个空间，再看到角色在这个空间里"
      slop_to_refuse: "空洞的风景展示（角色与环境没有关系）"
      example: "俯瞰一个繁华的城市夜景（2秒）→镜头落在A站在落地窗前的小小的身影（3秒）"

    - type: "动作/追逐（Pursuit/Action）"
      question: "动作的目标是什么？"
      segment_strategy: "短段密集（2-3秒/段），每段一个动作目标（翻越/闪避/冲刺），不要在一段里堆砌多动作"
      slop_to_refuse: "多动作堆叠在一个段里（观众看不清任何一个动作）"
      example: "A翻栏杆（2秒）→回头看（1秒）→继续跑（2秒）→拐进巷子（2秒）"

    - type: "转变/效果（Transformation）"
      question: "什么变了？怎么证明变了？"
      segment_strategy: "一个段聚焦在一个变化上——不需要多段，一段拍到变化前→变化中→变化后"
      slop_to_refuse: "用多人反应来稀释核心变化"
      example: "A 的脸从平静到震惊的过程中，不用切B的反应——只看A自己"

    - type: "喜剧/笑点（Comedic Beat）"
      question: "时机在哪里？"
      segment_strategy: "中段（3-5秒），前60%蓄势→后40%笑点。最关键的是笑点后的停顿"
      slop_to_refuse: "忙乱的镜头/画面抢了笑点的时机"
      example: "A 自信地推门（2秒）→撞到玻璃（1秒）→保持姿势不动（1秒）→若无其事走侧门（2秒）——节奏在沉默里"

    - type: "情绪低点（Emotional Low）"
      question: "他有多孤独？"
      segment_strategy: "长段（5-8秒），节奏慢，信息密度低——就是让观众和角色一起待在沉默里"
      slop_to_refuse: "用音乐/复杂镜头去渲染情绪（情绪不怕沉默，怕被打扰）"
      example: "A 独自坐在黑暗的客厅里，手里拿着没拨出的电话，没哭也没动——就只是坐着"

    - type: "产品/品牌展示（Product Hero）"
      question: "什么让它令人向往？"
      segment_strategy: "中段（4-5秒），从环境→细节→主体，一个连续的注视路径"
      slop_to_refuse: "让产品做太多动作（产品展示是让产品被看，不是让产品表演）"
      example: "从手握咖啡走进门（1秒）→咖啡杯特写（2秒）→杯沿抬起的动作（2秒）"

# =============================================================================
# 第八章：类型与调性 — 不同题材的导演手
# =============================================================================
genre_and_voice:
  description: "不是所有故事都用同一个节奏写。不同题材有不同的默认节奏、对白密度、画面风格。以下给出各类型的默认倾向，Agent A 可在剧本模板中引用。注意：以下为默认倾向，不是死规则。故意违反以制造对比效果（如温情片写了一段极紧张的快节奏）是高级用法。"

  genres:
    - genre: "现实主义叙事"
      pacing: "中速偏慢"
      dialogue_density: "适中"
      segment_avg: "4-6秒"
      visual_style: "生活化、不刻意的构图"
    - genre: "商业广告"
      pacing: "中速偏快"
      dialogue_density: "低（更依赖画面）"
      segment_avg: "2-4秒"
      visual_style: "精心构图的每帧"
    - genre: "动作/悬疑"
      pacing: "快节奏"
      dialogue_density: "低"
      segment_avg: "2-3秒"
      visual_style: "动感、对比鲜明"
    - genre: "温情/亲情"
      pacing: "慢节奏"
      dialogue_density: "适中偏高"
      segment_avg: "5-8秒"
      visual_style: "柔和、温暖调色"
    - genre: "喜剧"
      pacing: "有节奏的时快时慢"
      dialogue_density: "中高"
      segment_avg: "3-5秒"
      visual_style: "明亮、清晰的构图"
    - genre: "惊悚/恐怖"
      pacing: "先慢后快"
      dialogue_density: "低"
      segment_avg: "3-7秒（蓄势段长）"
      visual_style: "暗调、高对比"
    - genre: "短剧（竖屏）"
      pacing: "快节奏"
      dialogue_density: "高（信息量密集）"
      segment_avg: "2-4秒"
      visual_style: "近景为主、信息密集"
    - genre: "时尚/审美导向"
      pacing: "慢节奏"
      dialogue_density: "极低"
      segment_avg: "4-8秒"
      visual_style: "构图本身就是内容"

# =============================================================================
# 第九章：扩展性备注
# =============================================================================
extensibility:
  description: "本知识库可扩展。以下为各章节建议扩展方向。"
  proposed_extensions:
    - section: "第一章·导演五问"
      todo: "可加每个问题的默认值（如无明显偏好时用选项1）"
    - section: "第三章·段长选择"
      todo: "可加不同平台（抖音/小红书/YouTube Shorts）的段长适应表"
    - section: "第四章·对白排布"
      todo: "可加多语言（中文/英文）对白密度差异"
    - section: "第五章·亚文本转化"
      todo: "可加常见情绪的一对多行为库（20+条）"
    - section: "第八章·类型与调性"
      todo: "可加子类型（如黑色喜剧vs青春喜剧的区别）"
# =============================================================================
# 第十章：交互动作精确化 — 谁+部位+物体+效果
# =============================================================================
interactive_action_precision:
  description: "AI视频模型无法理解'进门''开门''拿起'等隐含动作——必须精确写'谁用什么部位碰什么物体产生什么效果'。模糊交互→降为B级可执行性。"
  
  principle: "每个涉及人物与道具/环境交互的△行，必须写'谁+部位+物体+效果'四要素。缺少任何一个要素即视为模糊交互。"
  
  counter_example:
    - action: "她走进咖啡馆"
      problem: "缺少'谁用什么部位碰什么物体'——AI无法确定是推门还是拉门、用哪只手"
    - action: "他拿起杯子"
      problem: "缺少'三指/五指/单手/双手'——AI可能生成整只手捏杯身的不自然动作"
    - action: "她坐下"
      problem: "缺少'扶椅背/屈膝/重心移动'——AI可能生成直接坠落的僵硬坐姿"
  
  good_example:
    - action: "她右手推开玻璃门把手，门向内转开，她跨过门槛进入"
      analysis: "右手+推+门把手+门转开——四要素完整"
    - action: "他右手三指握住杯柄，从桌面提起"
      analysis: "右手三指+握+杯柄+提起——精确到指位数"
    - action: "她左手扶椅背，屈膝落座，身体重心后移"
      analysis: "左手+扶椅背+屈膝+重心后移——动作拆分为子步骤"
    - action: "他双手翻开笔记本屏幕，右手食指按下电源键"
      analysis: "双手+翻开+屏幕+按下——双动作精确时序"
    - action: "门被一只右手从外侧推开，门把手顺时针转动"
      analysis: "右手+推开+逆因果关系——门被推所以把手转动"
  
  application_scenarios:
    - scenario: "开门类"
      template: "{角色}用{哪只手}{推/拉}{门类型/门把手}，门向{里/外}打开"
    - scenario: "拿取类"
      template: "{角色}用{哪只手}{几指}{握/捏/抓}{物品部位}，从{位置}{提起/拿起}"
    - scenario: "坐下类"
      template: "{角色}{左手/右手}扶{椅背/桌面}，{屈膝/弯腰}落座，重心{前移/后移}"
    - scenario: "开关电子设备"
      template: "{角色}用{哪只手/双手}{翻开/按下/旋转}{设备部位}"
    - scenario: "视线转向"
      template: "{角色}目光从{起始物}移到{目标物}，{头/眼}{转向/抬起/垂下}"
  
  relationship_to_other_chapters:
    - "与第5章（亚文本→行为转化）配合使用：先转化情绪为动作，再精确化交互细节"
    - "与第7章（场景类型覆盖）配合使用：不同场景类型对交互精确度要求不同（动作场景更高）"
    - "Agent A v5 规则：所有涉及道具交互的△行必须写四要素，否则可执行性评估降为B级"

# ==== 第十章结束 ====
# =============================================================================
# 第十一章：视觉风格锁定（style_keywords）
# =============================================================================
visual_style_locking:
  description: "创意指令阶段就确定视觉风格，锁定为全局常量。Agent B/C 不得随意修改 visual_style 设定。style_keywords 是 Agent D 审核依据——每段 Prompt 必须包含全部关键词。"
  
  principle: "风格决定一切下游选择。一个场景的视觉风格（写实/水墨/赛博/漫画）一旦确定，生图prompt、渲染prompt、灯光方案、母提示词都必须统一。风格漂移=项目品质失控。"
  
  counter_example:
    - scene: "推理短剧《锦灰局》"
      wrong: "第一段Prompt写'photorealistic CGI'，第三段Prompt漏了style_keywords被Seedance跑成'水墨国风'"
      consequence: "两段视觉不衔接→片段感→用户出戏"
    - scene: "现代情感短剧"
      wrong: "剧本阶段定风格'现代写实CG'，但Agent B生图用了'3D动画渲染'"
      consequence: "角色卡CGI与视频渲染风格不匹配→角色在视频里像动画人物"
  
  good_example:
    - scene: "火灾调查短剧（Phase 7）"
      style_name: "现代写实CG"
      style_keywords:
        - "photorealistic CGI"
        - "真人电影质感"
        - "PBR材质"
        - "体积雾"
        - "电影级叙事光影"
        - "8K超细节"
        - "AAA质量"
      locked_at: "剧本阶段（Agent A 写入 01_剧本/视觉风格锁定.yaml）"
      downstream: "Agent B 生图+分镜Prompt / Agent C 渲染Prompt → 全部嵌入 style_keywords"
      verification: "Agent D 两道关口（分镜审计 G7 / 渲染门禁 G7）检查每段Prompt全部style_keywords出现"
  
  rules:
    - rule: "Agent A 在剧本阶段确定 style_keywords → 写入 01_剧本/视觉风格锁定.yaml"
    - rule: "Agent B 生图 prompt 必须包含全部 style_keywords"
    - rule: "Agent C 渲染 prompt 必须包含全部 style_keywords"
    - rule: "Agent D 在分镜审计+渲染门禁两道关口检查 style_keywords 全部出现 → 缺失则打回"
    - rule: "不在Prompt里写'禁止卡通'等否定词——风格靠审核保证，不靠祈祷"
    - rule: "style_keywords 应包含：渲染风格(至少1个) + 光影(至少1个) + 画质(至少1个)"
  
  relationship_to_other_chapters:
    - "与第8章（类型与调性）配合：类型决定风格倾向（如现实主义=写实CG），但同一类型内部仍然需要具体锁定"
    - "与第9章（扩展性备注）配合：未来可建立风格关键词模板库（写实、水墨、赛博、漫画、剪纸等）"
    - "Agent A v5 全局规则：统一母提示词末尾必嵌 style_keywords"
    - "Agent D B14/B14+ 硬指标：每段Prompt含全部 style_keywords → 缺失阻断"

# ==== 第十一章结束 ====
