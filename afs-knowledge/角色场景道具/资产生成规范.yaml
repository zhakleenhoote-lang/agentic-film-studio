# 资产生成规范（AI导演 — 共享知识库）
# 每个资产类型需生成的图片数量和质量要求

角色:
  参考标杆: 角色卡品质标杆.yaml + references/角色卡品质标杆_杨岳.jpg
  ⚠️ v2更新: 12份官方文档禁止三视图/多视图 → 使用人脸特写+全身正面
  必生成:
    - 人脸特写图：肩以上/无表情/面部占2/3/竖版（独立图）
    - 全身正面图：全身/正面/竖版（独立图）
    - 六表情：对应剧本关键情绪的6格面部特写描述
    - 动作锚点：角色在典型场景中的标志性动作文字描述
    - 服化包：全身服装+发型+妆容+配饰详细描述
  可选:
    - 道具特写：角色专属道具的独立细节图
    - 场景氛围：角色在典型环境中的氛围镜头
  规格: PNG, 1024*1024, 写实CGI风格, 电影叙事光影/PBR材质/体积雾
  禁止: ❌ 三视图 ❌ 多视图拼贴 ❌ 九宫格拼合
  命名: {角色名}_人脸特写.png / {角色名}_全身.png
  旧命名: C-XXX_{角色名}_{维度}.png (保留兼容，但三视图维度不再生成)

场景:
  必生成:
    - 定场全景（展示空间全貌，含关键道具位置）
    - 核心角度特写（主要拍摄角度的场景细节）
  可选:
    - 四视图（根据复杂度）
  规格: 1024*1024, 按MASTER_STYLE统一光影
  命名: S-XXX_{场景名}_{角度}.png (如 S-001_公寓客厅_全景.png)

道具:
  参考标杆: 道具卡品质标杆.yaml + references/道具卡品质标杆_月华隐纬.jpg
  必生成:
    - 多角度视图：正面/侧面/背面，至少3角度
    - 材质纹理特写：织物/焦痕/表面质感的超近距离
    - 干湿双态对比：干燥 vs 湿润（织物/食物/材质变化类道具必做）
    - 尺寸参照：手部或常见物品作为比例参照
    - 状态对比：完好 vs 磨损/使用状态
  规格: 1024*1024, 写实产品记录风格, 侧光+漫反射
  布局: 多格拼接分区标注（A/B/C/D/E）
  命名: P-XXX_{道具名}_{维度}.png

风格参考板:
  形式: 文字描述（Markdown），不生成图片
  内容: 核心风格元素 + HEX色卡(≥6) + 光影规范 + 参考影片

## 总图量参考 ⚠️ v2更新

| 赛道 | 角色 | 场景 | 道具 | 预估总图量 |
|------|------|------|------|:--:|
| TVC 30s | 1人×2张(人脸特写+全身) | 3-4个×1张 | 1×2张 | 7-8张 |
| 短剧 | 2-4人×2张 | 4-6个×1张 | 2-4×1张 | 10-16张 |
| 微电影 | 3-5人×2张 | 6-10个×1张 | 3-6×1张 | 15-26张 |
