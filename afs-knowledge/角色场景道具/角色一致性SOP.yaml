          """
          path = output_dir / f"{char.name}_人脸特写.png"
          return call_image_api(prompt, path)  # t2i
      
      def generate_role_body(char, face_path, output_dir):
          """i2i 生成全身图（必基于人脸特写图）"""
          prompt = f"""
