      ## 4. 人种硬约束检查清单
      
      | 检查项 | 检查方式 | 阻断条件 |
      |--------|----------|---------|
      | 角色人脸图 prompt 含 Chinese/Asian | grep | 缺 → 阻断 |
      | 角色全身图 prompt 含 Chinese/Asian | grep | 缺 → 阻断 |
      | 全身图是 i2i 生成（非独立 t2i） | 检查 `i2i: true` | 缺 → 阻断 |
      | 角色卡含人种字段 | yaml 字段检查 | 缺 → 阻断 |
      | 关键帧 prompt 含 Chinese/Asian | grep | 缺 → 阻断 |
      | 关键帧基于角色人脸图 i2i 生成 | 来源一致性检查 | 缺 → 警告 |
      | 多角色时各角色不漂移 | 人脸特征比对 | 无法自动 → 人工抽查 |
      
      ## 5. 可复用的 i2i 调用函数
      
      ```python
      def call_i2i_api(prompt: str, source_image_path: str, output_path: str,
                        model: str = "seedream-5.0") -> bool:
          """
          通用 i2i 调用函数。
          支持 Seedream 5.0 / IP-Adapter / 其他 i2i 模型。
          
          Args:
              prompt: 生成 prompt（必含 Chinese/East Asian 硬约束）
              source_image_path: 源图路径（人脸特写图）
              output_path: 输出路径
              model: i2i 模型名
          
          Returns:
              bool: 是否成功
          """
          payload = {
              "model": model,
              "input": {
                  "i2i": True,
                  "role_consistency": True,
                  "source_image": source_image_path,
                  "prompt": prompt,
              }
          }
          # 调用 API
          response = requests.post(I2I_API_URL, json=payload, headers=HEADERS)
          response.raise_for_status()
          # 下载图片
          image_url = response.json().get("output", {}).get("image_url")
          img_data = requests.get(image_url).content
          with open(output_path, "wb") as f:
              f.write(img_data)
          return True
      ```
      
      ## 6. 错误处理
      
      | 场景 | 处理方式 |
      |------|----------|
      | Seedream 5.0 API 不可用 | 降级到 IP-Adapter FaceFix |
      | IP-Adapter 不可用 | 降级到语义锚定（1.3 方案C） |
      | 人脸一致性验证失败 | 重试 1 次；仍失败 → 阻断并通知主 agent |
      | 角色卡无人种字段 | 阻断，通知主 agent 补全 |
      | 关键帧 i2i 失败 | 退回到 t2i 但 prompt 必含人种硬约束 |
      
