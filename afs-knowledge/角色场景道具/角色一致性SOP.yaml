    ## 1. 角色参考图生成规范
  
    ### 1.1 生成顺序
    内容: |
      ```
      角色A_人脸特写.png（t2i 第1步）
        └── i2i ──→ 角色A_全身.png（基于人脸图生成）
      角色B_人脸特写.png（t2i 第1步）
        └── i2i ──→ 角色B_全身.png（基于人脸图生成）
      ```
      
      ### 1.2 第1步：人脸特写（t2i 通义万相2.5）
      ```python
      face_prompt = f"""
      Chinese / East Asian {char.role_type}, CGI character portrait,
      shoulder-up, neutral expression, face occupying 2/3 of frame,
      vertical composition, {char.visual_anchor},
      photorealistic CGI rendering, PBR materials, cinematic lighting,
      neutral grey background, soft front lighting.
      中国/东亚人物、3A写实CG、PBR材质、电影级光影、中性灰背景、柔和正面光。
      """
      ```
      
      ### 1.3 第2步：全身正立（i2i — 必须基于人脸图）
      #### 方案A：Seedream 5.0（推荐 · 支持 i2i + 人脸一致性）
      
      ```python
      # Seedream 5.0 i2i API 调用
      seedream_payload = {
          "model": "seedream-5.0",
          "input": {
              "i2i": True,
              "role_consistency": True,  # 人脸一致性开关
              "source_image_path": "{角色A_人脸特写.png}",
              "prompt": f"""
      Chinese / East Asian {char.role_type}, Full body CGI character,
      standing pose, front view, vertical composition,
      {char.visual_anchor}, {char.full_outfit},
      photorealistic CGI rendering, PBR materials, cinematic lighting,
      neutral grey background, soft front lighting.
      中国/东亚人物、3A写实CG、PBR材质、全身正面、站立姿态、电影级光影。
      保持面部与参考图完全一致，发型、眉型、肤色、五官位置不变。
              """
          }
      }
      ```
      
      #### 方案B：IP-Adapter（备选 · 无原生 i2i 时）
      
      ```python
      # IP-Adapter + 通义万相2.5 FaceFix
      ip_adapter_payload = {
          "model": "wan2.7-image-pro",
          "input": {
              "messages": [{
                  "role": "user",
                  "content": [
                      {"type": "image", "image": "{角色A_人脸特写.png}"},
                      {"type": "text", "text": f"""
      Chinese / East Asian {char.role_type}, Full body CGI character,
      standing pose, front view, vertical composition,
      {char.visual_anchor}, {char.full_outfit},
      photorealistic CGI rendering, PBR materials, cinematic lighting,
      neutral grey background, soft front lighting.
      保持面部ID与提供的参考图完全一致，不可改变五官位置和比例。
                      """}
                  ]
              }]
          }
      }
      ```
      
      #### 方案C：同 prompt 复现+语义锚定（兜底）
      若 i2i API 不可用，**必须**在全身 prompt 中加语义锚定词：
      ```
      面部特征：{面部锚定词}（全脸五官分布/眉形/颧骨/下颌线 精确文字描述）
      ```
      
      ### 1.4 角色卡必含字段（人种+服装+伤疤锚点）
      
      ```yaml
      人种: "Chinese / East Asian"
      皮肤: "偏黄暖调 / 东亚人种肤质"
      服装锚点:
        颜色: "黑色战术外套"
        款式: "立领拉链，左臂有绷带缠绕"
        材质: "高密度尼龙布料"
      伤疤/装饰锚点:
        - 位置: "右眉上方"
          描述: "垂直刀疤，长约3cm"
        - 位置: "左臂"
          描述: "旧伤绷带，边缘微渗血"
      ```
      
