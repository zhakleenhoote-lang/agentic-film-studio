      ## 2. 关键帧生成规范
      
      ### 2.1 关键帧 prompt 模板（必含人种硬约束）
      
      ```
      Chinese / East Asian {性别/年龄}，{服装锚点}，{伤疤/装饰锚点}，
      {动作描述}，{场景环境}，{光影色温}，{风格关键词}
      ```
      
      ### 2.2 正确示例（含人种）
      ```python
      # ✅ 正确：首位加人种约束
      kf_prompt = f"""
      Chinese / East Asian middle-aged man, black tactical jacket, bandaged left arm,
      scar above right eyebrow, slowly removing jacket in abandoned factory,
      warm sunset sidelight, volumetric dust particles,
      photorealistic CGI, PBR, cinematic lighting, 8K, AAA.
      """
      ```
      
      ### 2.3 错误示例（Phase 7 反例）
      ```python
      # ❌ 错误：缺人种约束 → 通义万相默认走西方
      kf_prompt = f"""
      Wide shot two men facing off in abandoned factory sunset
      Older man black jacket pulling jacket off
      """
      ```
      
      ### 2.4 关键帧 i2i 规则
      每个关键帧图应该基于对应角色的"人脸特写"图 i2i 生成：
      ```
      角色A_人脸特写.png → i2i → KF-N_{描述}.png
      ```
      确保关键帧中的人物与角色参考图是同一个人。
      
