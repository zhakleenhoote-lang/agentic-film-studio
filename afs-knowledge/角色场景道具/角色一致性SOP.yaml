      ### 3.2 `generate_keyframes.py`（关键帧生成脚本）
      
      ```python
      #!/usr/bin/env python3
      """
      generate_keyframes.py — 关键帧生成脚本（人种硬约束）
      
      流程:
        1. 读取分镜表和角色卡
        2. 基于角色人脸图 i2i 生成每张关键帧
        3. prompt 首位必含 "Chinese / East Asian"
        4. verify 人种约束
      """
      
      def build_kf_prompt(character, action, scene, lighting, style):
          """构建关键帧 prompt（自动加人种硬约束）"""
          ethnicity = character.get("ethnicity", "Chinese / East Asian")
          return f"""
          {ethnicity} {character.role_type}, {character.visual_anchor},
          {character.scar_description},
          {action}, {scene}, {lighting}, {style}
          """
      
      def generate_keyframes(characters, kf_list, output_dir):
          """逐帧生成，i2i 模式"""
          for kf in kf_list:
              char = characters[kf.character_name]
              face_path = output_dir / f"{char.name}_人脸特写.png"
              
              prompt = build_kf_prompt(char, kf.action, kf.scene, kf.lighting, kf.style)
              kf_path = output_dir / f"KF-{kf.id:02d}_{kf.description}.png"
              
              # i2i：基于人脸图生成
              call_i2i_api(prompt, face_path, kf_path)
      
      def verify_ethnicity_constraint(kf_prompts):
          """验证所有关键帧 prompt 包含人种约束"""
          required = ["Chinese", "East Asian", "中国人", "亚洲人", "东方面孔"]
          failing = []
          for kf_name, prompt in kf_prompts.items():
              if not any(term in prompt for term in required):
                  failing.append(kf_name)
          if failing:
              raise RuntimeError(f"关键帧缺人种约束: {failing}")
          print(f"✅ 全部 {len(kf_prompts)} 张关键帧人种约束通过")
      ```
      
