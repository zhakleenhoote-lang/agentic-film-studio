# 统一母提示词（AI导演 — 共享知识库）
# 用途：所有角色卡、场景卡、道具卡、分镜Prompt末尾强制嵌入
# 来源：对标《锦灰局》学员作业 + 蝈蝈课程M3标准

统一母提示词: "3A写实CG、电影级叙事光影、PBR材质、体积雾、冷暖对比、超细节、8K、AAA质量"

# ⚠️ 中国角色硬约束（Phase 7 反例修复 — 2026-07-09 追加）
# 所有角色/关键帧 prompt 必须显式声明人种，禁止默认西方风格
# 嵌入位置：prompt 首位（主体描述之前）
# 参考 SOP：skills/knowledge/角色一致性SOP.yaml
中国角色硬约束: "中国/东亚人物、东方人种特征、East Asian facial features"

适用场景:
  - 角色卡九维: 嵌入角色图片生成Prompt末尾
  - 场景卡七维: 嵌入场景图片生成Prompt末尾
  - 道具卡六维: 嵌入道具图片生成Prompt末尾
  - 分镜Prompt: 嵌入每个镜头的渲染Prompt末尾
  - 风格参考板: 作为视觉基线描述

不适用:
  - 纯文本描述（如剧本.md、人物小传.md）
  - Agent D审计报告的正文

嵌入位置: Prompt末尾，紧接四句约束词之前
示例: "...电影级叙事光影、PBR材质。面部清晰不变形，人体结构比例正常，动作自然流畅连贯，画面稳定无抖动。"
