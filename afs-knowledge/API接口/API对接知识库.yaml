# ============================================================
# 1. Seedance 2.0（视频生成主力）
# ============================================================
Seedance 2.0:
  平台: 火山引擎 ARK
  模型ID: doubao-seedance-2-0-260128
  端点ID: ep-20260705101905-6sz4b  # 调用时用这个替代模型ID
  认证: "Authorization: Bearer ark-6e…2662"
  
  # API端点
  提交任务: "POST https://ark.cn-beijing.volces.com/api/v3/contents/generations/tasks"
  查询状态: "GET https://ark.cn-beijing.volces.com/api/v3/contents/generations/tasks/{task_id}"
  
  # 基础请求格式（已验证·v2 基于12份官方文档修正）
  请求体:
    model: ep-20260705101905-6sz4b  # ⚠️ 用端点ID，不是模型ID
    content:
      - type: text
        text: "提示词文本"
    parameters:
      duration: 5           # ⚠️ 整数秒！4/5/6/8/10/12/15，不是毫秒！
      ratio: "9:16"         # 竖屏
      resolution: "720p"    # 480p/720p/1080p(仅2.0)/4k(仅2.0)
      generate_audio: true  # ✅ 原生生成人声+音效+BGM（对白用{}标注）
  
  # ✅ 对白/人声/音视频同步 ✅
  # generate_audio=true 原生支持人声+音效+BGM，对白放双引号内或{}内
  # 提示词示例：男人说：{你记住，以后不可以用手指指月亮。}
  # 有声视频均为单声道
  # 07/05测试29镜无对白是因prompt未按双引号格式触发，非API不支持
  # TTS仅兜底（多人场景人声混乱/音频失真/特定音色需求时触发）
  
  # 内容审核/策略拦截
  策略:
    - 含"说"/"say"/"speak"等词→OutputVideoSensitiveContentDetected
    - 含具体对话文本→版权保护拦截
    - 真人面部不能作为I2V参考图输入
    - 模型自身产出的含人脸素材可作为输入（首帧→尾帧方案）
  
  # 已验证的功能
  已验证:
    - t2v文生视频: ✅（30镜全部成功）
    - 竖屏9:16: ✅
    - 时长5秒(设3000ms): ✅
    - 环境音生成: ✅
    - 尾帧提取(ffmpeg): ✅
    - 人声对话: ✅（07/07 官方文档确认 generate_audio 原生支持人声+音效+BGM，提示词用双引号触发对白）
    - i2v图生视频: 未完整验证（尾帧有但缺上传URL）
  
  # 费用
  费用: "约¥3-5/条(5秒720p)"  # 实际消耗偏高，需精准确认
  备注: "按生成次数计费，不论成功与否"

# ============================================================
# 2. 通义万相 2.5（参考图生成）
# ============================================================
通义万相 2.5:
  平台: 阿里云 DashScope（灵积）
  模型: wan2.1-t2i-turbo  # 文生图
  认证: "Authorization: Bearer sk-ws-…NtD2"
  
  # API端点
  提交: "POST https://dashscope.aliyuncs.com/api/v1/services/aigc/image-generation/generation"
  必需头: "X-DashScope-Async: enable"  # ⚠️ 异步模式，不加此头会超时
  
  # 请求格式
  请求体:
    model: wan2.1-t2i-turbo
    input:
      prompt: "描述文本"
    parameters:
      size: "1024*1024"  # 仅支持1024×1024
      n: 1               # 生成张数
  
  # 限制
  限制:
    - 仅文生图，不支持图生图
    - 生成的人脸图不能直接用于Seedance I2V
    - 仅1024×1024方图
  
  用途: 场景参考图、产品图、风格参考板（非人物面部）

