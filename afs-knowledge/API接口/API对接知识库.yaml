# ============================================================
# 8. ffmpeg（本地合成，免费）
# ============================================================
ffmpeg:
  平台: 本地
  用途: 视频拼接、尾帧提取、音视频合成、多格式导出
  费用: "¥0（本地工具）"
  
  常用命令:
    视频拼接: "ffmpeg -f concat -safe 0 -i concat_list.txt -c copy output.mp4"
    尾帧提取: "ffmpeg -sseof -1 -i input.mp4 -vframes 1 -q:v 2 last_frame.png"
    音视频合成: "ffmpeg -i video.mp4 -i audio.mp3 -c:v copy -c:a aac output.mp4"

