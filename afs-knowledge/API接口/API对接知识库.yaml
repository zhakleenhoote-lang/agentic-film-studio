# ============================================================
# ⚠️ 已知坑和避坑指南
# ============================================================
避坑指南:
  - Seedance用端点ID不是模型ID
  - Seedance原生支持人声对白（{}标注），TTS仅当原生音频不合格时兜底
  - Seedance会拦截含对话意图的Prompt
  - 通义万相必须加X-DashScope-Async: enable
  - 通义万相只支持1024×1024方图
  - 不要在验证前铺全量（200块的教训）
  - 大JSON请求体用-d @tmpfile避免命令行参数过长
  - API Key不要硬编码在脚本里（安全+会被脱敏）
