# 首帧→尾帧连续生成方案（AI导演 — 共享知识库）

用途: 解决 Seedance 2.0 独立镜头生成导致的角色不一致问题

原理: |
  Seedance 2.0 每个镜头独立生成，角色外貌/光线/构图在镜头间漂移。
  解决方案：同一镜头组内，Shot N 生成后提取尾帧 → 作为 Shot N+1 的参考图。
  组内首个镜头文生视频，后续镜头图生视频(尾帧参考)。

镜头组划分规则:
  - 同一场景 + 同一角色出场的连续镜头 = 一组
  - 场景切换或主要角色变化 = 新组
  - 闪回/回忆 = 独立组（光影差异需重置）
  - 每组 3-8 镜为佳

尾帧提取:
  命令: "ffmpeg -sseof -1 -i shot_N.mp4 -vframes 1 -q:v 2 last_frame_N.png"
  格式: PNG
  用途: 下一镜的参考图

参考图传递:
  组内第一镜: 无参考图，文生视频
  组内后续镜: 前序尾帧为参考，图生视频
  新组第一镜: 重置，文生视频
  闪回组: 永远不继承前序参考

失败回退:
  层级1: 原始Prompt(含锚定词+对话)
  层级2: 去锚定词(仅画面描述)
  层级3: 简化Prompt(去敏感细节)
  层级4: 标记失败跳过
